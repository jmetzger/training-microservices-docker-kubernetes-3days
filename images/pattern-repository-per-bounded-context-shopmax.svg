<svg width="700" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Repository per Bounded Context: Querzugriffe im Code werden gekappt</title>
<desc>Vorher greift das Shipping-Modul direkt auf orderRepository zu, obwohl es fachlich zum Order-Modul gehoert. Nachher besitzt jedes Modul sein eigenes Repository, andere Module rufen nur noch eine oeffentliche Methode auf.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="26">1. Vorher — Shipping greift quer auf orders zu</text>
<g class="c-purple"><rect x="30" y="45" width="160" height="42" rx="6"/><text class="ts" x="110" y="70" text-anchor="middle" dominant-baseline="central">Shipping-Modul</text></g>
<line x1="190" y1="66" x2="450" y2="66" class="arr" marker-end="url(#a4)" stroke="#B5433B" stroke-dasharray="4 3"/>
<text class="tc" x="205" y="55" fill="#B5433B">orderRepository.findById() — Querzugriff</text>
<g class="c-blue"><rect x="455" y="45" width="200" height="42" rx="6"/><text class="ts" x="555" y="70" text-anchor="middle" dominant-baseline="central">orders (Order-Modul)</text></g>

<line x1="30" y1="120" x2="670" y2="120" stroke="#DEDBD0" stroke-width="1"/>

<text class="th" x="30" y="148">2. Nachher — Zugriff nur ueber das eigene Repository</text>
<g class="c-purple"><rect x="30" y="165" width="160" height="42" rx="6"/><text class="ts" x="110" y="190" text-anchor="middle" dominant-baseline="central">Shipping-Modul</text></g>
<line x1="190" y1="186" x2="360" y2="186" class="arr" marker-end="url(#a4)"/>
<text class="tc" x="200" y="176">orderModule.getOrderSummary(id)</text>
<g class="c-blue"><rect x="365" y="165" width="160" height="42" rx="6"/><text class="ts" x="445" y="190" text-anchor="middle" dominant-baseline="central">Order-Modul</text></g>
<line x1="445" y1="207" x2="445" y2="235" class="arr" marker-end="url(#a4)"/>
<g class="c-gray"><rect x="365" y="240" width="160" height="35" rx="6"/><text class="ts" x="445" y="260" text-anchor="middle" dominant-baseline="central">OrderRepository → orders</text></g>
<text class="tc" x="30" y="255" fill="#0F6E56">nur Order-Modul nutzt OrderRepository</text>
</svg>
