<svg width="700" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Database View: Cart-Service liest nur eine eingeschraenkte View auf products</title>
<desc>Cart-Service greift nicht auf die volle products-Tabelle zu, sondern auf eine View mit nur den oeffentlich relevanten Spalten. Interne Spalten wie Einkaufspreis bleiben verborgen.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="a7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="c-blue">
  <rect x="30" y="90" width="140" height="50" rx="8"/>
  <text class="th" x="100" y="118" text-anchor="middle" dominant-baseline="central">Cart-Service</text>
</g>

<line x1="60" y1="90" x2="450" y2="30" class="arr" stroke="#B5433B" stroke-dasharray="4 3"/>
<text class="tc" x="180" y="45" fill="#B5433B">kein Direktzugriff auf die Basistabelle</text>

<line x1="170" y1="115" x2="330" y2="115" class="arr" marker-end="url(#a7)"/>

<g class="c-purple">
  <rect x="335" y="90" width="180" height="50" rx="8"/>
  <text class="th" x="425" y="110" text-anchor="middle" dominant-baseline="central">product_catalog_view</text>
  <text class="tc" x="425" y="128" text-anchor="middle">id, name, price, category</text>
</g>

<line x1="425" y1="140" x2="425" y2="170" class="arr" marker-end="url(#a7)"/>

<g class="c-gray">
  <rect x="335" y="175" width="260" height="60" rx="8"/>
  <text class="ts" x="355" y="196">products (Monolith-DB, volle Tabelle)</text>
  <text class="tc" x="355" y="214">id, name, price, category,</text>
  <text class="tc" x="355" y="228" fill="#8A8880">Einkaufspreis, Marge — verborgen</text>
</g>
</svg>
