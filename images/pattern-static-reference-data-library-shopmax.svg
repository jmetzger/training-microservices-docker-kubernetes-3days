<svg width="700" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Static Reference Data Library: Bestellstatus-Codes als gemeinsame Java-Bibliothek</title>
<desc>Order-, Payment- und Shipping-Service binden alle dieselbe Bibliothek shopmax-common-refdata als Dependency ein, statt eigene Enums zu pflegen oder Netzwerk-Calls zu machen.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="b5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="c-purple">
  <rect x="260" y="20" width="180" height="46" rx="8"/>
  <text class="th" x="350" y="38" text-anchor="middle">shopmax-common-refdata</text>
  <text class="tc" x="350" y="55" text-anchor="middle">Maven-Bibliothek, kein Service</text>
</g>

<line x1="300" y1="66" x2="120" y2="130" class="arr" marker-end="url(#b5)"/>
<line x1="350" y1="66" x2="350" y2="130" class="arr" marker-end="url(#b5)"/>
<line x1="400" y1="66" x2="580" y2="130" class="arr" marker-end="url(#b5)"/>
<text class="tc" x="150" y="100">Dependency,</text>
<text class="tc" x="150" y="114">kein Netzwerk-Call</text>

<g class="c-blue"><rect x="30" y="135" width="180" height="40" rx="6"/><text class="ts" x="120" y="159" text-anchor="middle" dominant-baseline="central">Order-Service (Java)</text></g>
<g class="c-blue"><rect x="260" y="135" width="180" height="40" rx="6"/><text class="ts" x="350" y="159" text-anchor="middle" dominant-baseline="central">Payment-Service (Java)</text></g>
<g class="c-blue"><rect x="490" y="135" width="180" height="40" rx="6"/><text class="ts" x="580" y="159" text-anchor="middle" dominant-baseline="central">Shipping-Service (Java)</text></g>

<text class="ts" x="30" y="200">Funktioniert nur, weil alle Services Java sind — ein Service in anderer</text>
<text class="ts" x="30" y="216" fill="#8A8880">Sprache koennte die Bibliothek nicht einbinden (dann Pattern 4 statt 17).</text>
</svg>
