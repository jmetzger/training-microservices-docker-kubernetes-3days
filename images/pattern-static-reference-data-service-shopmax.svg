<svg width="700" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Static Reference Data Service: drei Services fragen einen zentralen Country-Code-Service</title>
<desc>Vorher lesen Order-, Payment- und Shipping-Modul die countries-Tabelle direkt im Monolithen. Nachher fragen alle drei Services einen dedizierten Country-Code-Service per API, statt eigene Kopien zu pflegen.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
</style>
<defs>
  <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="26">1. Vorher — drei Module lesen direkt gegen dieselbe Tabelle</text>
<g class="c-blue"><rect x="30" y="40" width="130" height="36" rx="6"/><text class="ts" x="95" y="61" text-anchor="middle" dominant-baseline="central">Order-Modul</text></g>
<g class="c-blue"><rect x="180" y="40" width="130" height="36" rx="6"/><text class="ts" x="245" y="61" text-anchor="middle" dominant-baseline="central">Payment-Modul</text></g>
<g class="c-blue"><rect x="330" y="40" width="130" height="36" rx="6"/><text class="ts" x="395" y="61" text-anchor="middle" dominant-baseline="central">Shipping-Modul</text></g>
<line x1="95" y1="76" x2="480" y2="130" class="arr"/>
<line x1="245" y1="76" x2="480" y2="130" class="arr"/>
<line x1="395" y1="76" x2="480" y2="130" class="arr"/>
<g class="c-gray"><rect x="480" y="115" width="190" height="40" rx="6"/><text class="ts" x="575" y="138" text-anchor="middle" dominant-baseline="central">countries (Monolith-DB)</text></g>
<text class="tc" x="30" y="105" fill="#8A8880">SELECT tax_rate FROM countries — drei unabhaengige Direktzugriffe</text>

<line x1="30" y1="180" x2="670" y2="180" stroke="#DEDBD0" stroke-width="1"/>

<text class="th" x="30" y="205">2. Nachher — ein Service, eine Wahrheit</text>
<g class="c-blue"><rect x="30" y="220" width="130" height="36" rx="6"/><text class="ts" x="95" y="241" text-anchor="middle" dominant-baseline="central">Order-Service</text></g>
<g class="c-blue"><rect x="180" y="220" width="130" height="36" rx="6"/><text class="ts" x="245" y="241" text-anchor="middle" dominant-baseline="central">Payment-Service</text></g>
<g class="c-blue"><rect x="330" y="220" width="130" height="36" rx="6"/><text class="ts" x="395" y="241" text-anchor="middle" dominant-baseline="central">Shipping-Service</text></g>
<line x1="95" y1="256" x2="560" y2="290" class="arr" marker-end="url(#a3)"/>
<line x1="245" y1="256" x2="560" y2="290" class="arr" marker-end="url(#a3)"/>
<line x1="395" y1="256" x2="560" y2="290" class="arr" marker-end="url(#a3)"/>
<g class="c-teal"><rect x="480" y="290" width="190" height="42" rx="6"/><text class="th" x="575" y="311" text-anchor="middle" dominant-baseline="central">Country-Code-Service</text></g>
<text class="tc" x="30" y="285" fill="#0F6E56">GET /tax-info?country=... — API-Call, kein SQL-Join mehr</text>
</svg>
