<svg width="700" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Database-as-a-Service Interface: eigene Read-Only-DB fuer das Legacy-BI-Tool</title>
<desc>Order-Service haelt seine interne Datenbank privat. Eine separate, dedizierte Read-Only-Datenbank wird per CDC aktuell gehalten, das BI-Tool verbindet sich per SQL/JDBC direkt mit dieser Kopie, nicht mit der internen DB.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
</style>
<defs>
  <marker id="b1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="c-blue">
  <rect x="30" y="40" width="180" height="55" rx="8"/>
  <text class="th" x="120" y="60" text-anchor="middle">Order-Service</text>
  <text class="tc" x="120" y="78" text-anchor="middle">interne DB, privat</text>
</g>

<line x1="210" y1="67" x2="330" y2="67" class="arr" marker-end="url(#b1)"/>
<text class="tc" x="215" y="57">CDC (fortlaufend)</text>

<g class="c-teal">
  <rect x="335" y="40" width="200" height="55" rx="8"/>
  <text class="th" x="435" y="60" text-anchor="middle">Read-Only-DB</text>
  <text class="tc" x="435" y="78" text-anchor="middle">eigene, dedizierte Kopie</text>
</g>

<line x1="670" y1="67" x2="540" y2="67" class="arr" marker-end="url(#b1)"/>
<text class="tc" x="545" y="57">SQL / JDBC</text>

<g class="c-gray">
  <rect x="580" y="40" width="90" height="55" rx="8"/>
  <text class="ts" x="625" y="60" text-anchor="middle">BI-Tool</text>
  <text class="tc" x="625" y="78" text-anchor="middle">(Legacy)</text>
</g>

<text class="ts" x="30" y="150">Wichtig: Der "Endpunkt" ist eine echte Datenbank, keine REST-API —</text>
<text class="ts" x="30" y="170">das BI-Tool verbindet sich mit einer Connection-String/Adresse, genau</text>
<text class="ts" x="30" y="190">so wie es das schon immer konnte. Nur die Ziel-DB ist jetzt eine andere.</text>

<g class="c-gray">
  <rect x="30" y="210" width="640" height="30" rx="6"/>
  <text class="tc" x="46" y="229" font-weight="600">Einordnung: Dauerloesung möglich — solange der Legacy-Client SQL braucht.</text>
</g>
</svg>
