<svg width="700" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Split Table: products wird in Product-Service und Inventory-Service aufgeteilt</title>
<desc>Die Monolith-Tabelle products traegt Katalog- und Bestandsdaten gemeinsam. Split Table teilt sie spaltenweise in eine Product-Service-Tabelle und eine Inventory-Service-Tabelle auf, verbunden ueber product_id als lose Referenz.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-gray .ts { fill: #5F5E5A; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-blue .ts { fill: #185FA5; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
.c-teal .ts { fill: #0F6E56; }
</style>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="28">Vorher: eine Tabelle, zwei Verantwortlichkeiten</text>

<g class="c-gray">
  <rect x="30" y="45" width="260" height="150" rx="8"/>
  <text class="th" x="50" y="68">Monolith-DB</text>
  <text class="ts" x="50" y="88">products</text>
  <text class="tc" x="50" y="106">id, name, description,</text>
  <text class="tc" x="50" y="122">price, category</text>
  <text class="tc" x="50" y="146" fill="#0F6E56" font-weight="600">stock_level,</text>
  <text class="tc" x="50" y="162" fill="#0F6E56" font-weight="600">warehouse_location</text>
  <text class="tc" x="50" y="182" fill="#8A8880">↑ hochfrequent, anderes Team</text>
</g>

<line x1="290" y1="120" x2="360" y2="120" class="arr" marker-end="url(#arrow2)"/>
<text class="ts" x="292" y="107">Split Table</text>

<g class="c-blue">
  <rect x="365" y="45" width="300" height="70" rx="8"/>
  <text class="th" x="385" y="68">Product-Service-DB</text>
  <text class="ts" x="385" y="86">products</text>
  <text class="tc" x="385" y="102">id, name, description, price, category</text>
</g>

<g class="c-teal">
  <rect x="365" y="125" width="300" height="70" rx="8"/>
  <text class="th" x="385" y="148">Inventory-Service-DB</text>
  <text class="ts" x="385" y="166">inventory</text>
  <text class="tc" x="385" y="182">product_id, stock_level, warehouse_location</text>
</g>

<line x1="470" y1="115" x2="470" y2="125" class="arr" stroke-dasharray="3 3"/>
<text class="tc" x="478" y="122" fill="#8A8880">product_id (lose Referenz, kein FK)</text>

<text class="th" x="30" y="230">Migrationsschritte</text>
<text class="ts" x="30" y="252">1. Neue Tabelle inventory anlegen  →  2. Backfill  →  3. Dual Write</text>
<text class="ts" x="30" y="272">4. Order-Service liest ab jetzt bei Inventory-Service  →  5. Alte Spalten in products loeschen</text>

<g class="c-gray">
  <rect x="30" y="295" width="635" height="30" rx="6"/>
  <text class="tc" x="46" y="314" font-weight="600">Einordnung: Dauerloesung — das Zielschema, keine Zwischenstufe.</text>
</g>
</svg>
