<svg width="700" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Monolith as Data Access Layer: Shipping-Service hat noch keine eigene DB</title>
<desc>Shipping-Service ist als eigenes Deployment entstanden, greift aber nicht direkt auf die Datenbank zu, sondern ruft eine schmale API am Monolithen auf, der weiterhin alle Daten haelt.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="a8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="26">Was NICHT passiert (kein eigener Datenbestand)</text>
<g class="c-purple"><rect x="30" y="42" width="170" height="42" rx="6"/><text class="ts" x="115" y="67" text-anchor="middle" dominant-baseline="central">Shipping-Service</text></g>
<line x1="200" y1="63" x2="330" y2="63" stroke="#B5433B" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="255" y1="55" x2="275" y2="71" stroke="#B5433B" stroke-width="1.5"/>
<line x1="255" y1="71" x2="275" y2="55" stroke="#B5433B" stroke-width="1.5"/>
<text class="tc" x="335" y="58" fill="#B5433B">kein eigenes shipments</text>

<line x1="30" y1="105" x2="670" y2="105" stroke="#DEDBD0" stroke-width="1"/>

<text class="th" x="30" y="132">Was tatsaechlich passiert: API-Aufruf am Monolithen</text>
<g class="c-purple"><rect x="30" y="150" width="170" height="42" rx="6"/><text class="ts" x="115" y="175" text-anchor="middle" dominant-baseline="central">Shipping-Service</text></g>
<line x1="200" y1="171" x2="380" y2="171" class="arr" marker-end="url(#a8)"/>
<text class="tc" x="210" y="160">GET /internal/orders/{id}/shipment-info</text>
<g class="c-gray"><rect x="385" y="150" width="150" height="42" rx="6"/><text class="ts" x="460" y="175" text-anchor="middle" dominant-baseline="central">Monolith</text></g>
<line x1="460" y1="192" x2="460" y2="220" class="arr" marker-end="url(#a8)"/>
<g class="c-gray"><rect x="385" y="225" width="150" height="30" rx="6"/><text class="tc" x="460" y="243" text-anchor="middle">Monolith-DB</text></g>

<text class="ts" x="560" y="175">befristet —</text>
<text class="ts" x="560" y="192">bis Ownership</text>
<text class="ts" x="560" y="209">wechselt</text>
</svg>
