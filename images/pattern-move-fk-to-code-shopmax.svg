<svg width="700" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Move Foreign Key Relationship to Code: order_items verliert den physischen FK auf products</title>
<desc>Vorher haben order_items und products einen Datenbank-Foreign-Key im selben Schema. Nachher liegen beide Tabellen in getrennten Datenbanken, die Referenz wird nur noch in der Anwendung geprueft.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="28">1. Vorher — physischer FK, ein Schema</text>
<g class="c-gray">
  <rect x="30" y="45" width="640" height="90" rx="8"/>
  <text class="ts" x="50" y="65">Monolith-DB</text>
  <g class="c-blue">
    <rect x="50" y="80" width="180" height="42" rx="6"/>
    <text class="ts" x="140" y="105" text-anchor="middle" dominant-baseline="central">order_items</text>
  </g>
  <line x1="230" y1="101" x2="460" y2="101" class="arr" marker-end="url(#a2)"/>
  <text class="tc" x="255" y="90">FK product_id → products.id</text>
  <g class="c-blue">
    <rect x="465" y="80" width="180" height="42" rx="6"/>
    <text class="ts" x="555" y="105" text-anchor="middle" dominant-baseline="central">products</text>
  </g>
</g>

<text class="th" x="30" y="170">2. Nachher — getrennte Datenbanken, Referenz im Code</text>

<g class="c-gray">
  <rect x="30" y="185" width="290" height="95" rx="8"/>
  <text class="ts" x="50" y="203">Order-Service-DB</text>
  <g class="c-blue">
    <rect x="50" y="213" width="180" height="35" rx="6"/>
    <text class="ts" x="140" y="235" text-anchor="middle" dominant-baseline="central">order_items</text>
  </g>
  <g class="c-purple">
    <rect x="50" y="253" width="250" height="22" rx="4"/>
    <text class="tc" x="60" y="267">if (!productClient.exists(id)) throw ...</text>
  </g>
</g>

<line x1="320" y1="230" x2="390" y2="230" class="arr" stroke-dasharray="4 3"/>
<text class="tc" x="322" y="220" fill="#8A8880">product_id (lose Referenz, kein FK)</text>

<g class="c-gray">
  <rect x="395" y="185" width="275" height="95" rx="8"/>
  <text class="ts" x="415" y="203">Product-Service-DB</text>
  <g class="c-blue">
    <rect x="415" y="213" width="180" height="35" rx="6"/>
    <text class="ts" x="505" y="235" text-anchor="middle" dominant-baseline="central">products</text>
  </g>
</g>
</svg>
