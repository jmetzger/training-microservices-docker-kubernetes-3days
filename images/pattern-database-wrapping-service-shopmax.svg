<svg width="700" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Database Wrapping Service: direkter SQL-Zugriff auf orders wird unterbunden</title>
<desc>Vorher greifen mehrere Module direkt per SQL auf orders zu. Nachher steht eine duenne API-Schicht davor, alle Zugriffe laufen ueber OrderQueryService.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
</style>
<defs>
  <marker id="b2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="24">1. Vorher — mehrere direkte Zugriffe</text>
<g class="c-purple"><rect x="30" y="38" width="130" height="34" rx="6"/><text class="ts" x="95" y="59" text-anchor="middle" dominant-baseline="central">Shipping</text></g>
<g class="c-purple"><rect x="30" y="80" width="130" height="34" rx="6"/><text class="ts" x="95" y="101" text-anchor="middle" dominant-baseline="central">Invoicing</text></g>
<line x1="160" y1="55" x2="440" y2="87" class="arr" stroke="#B5433B" stroke-dasharray="4 3"/>
<line x1="160" y1="97" x2="440" y2="87" class="arr" stroke="#B5433B" stroke-dasharray="4 3"/>
<text class="tc" x="165" y="70" fill="#B5433B">SELECT * FROM orders (direkt)</text>
<g class="c-blue"><rect x="445" y="65" width="180" height="45" rx="6"/><text class="ts" x="535" y="92" text-anchor="middle" dominant-baseline="central">orders (Tabelle)</text></g>

<line x1="30" y1="140" x2="670" y2="140" stroke="#DEDBD0" stroke-width="1"/>

<text class="th" x="30" y="165">2. Nachher — eine API-Schicht davor</text>
<g class="c-purple"><rect x="30" y="180" width="130" height="34" rx="6"/><text class="ts" x="95" y="201" text-anchor="middle" dominant-baseline="central">Shipping</text></g>
<g class="c-purple"><rect x="30" y="222" width="130" height="34" rx="6"/><text class="ts" x="95" y="243" text-anchor="middle" dominant-baseline="central">Invoicing</text></g>
<line x1="160" y1="197" x2="320" y2="215" class="arr" marker-end="url(#b2)"/>
<line x1="160" y1="239" x2="320" y2="221" class="arr" marker-end="url(#b2)"/>
<g class="c-blue"><rect x="325" y="200" width="180" height="40" rx="6"/><text class="ts" x="415" y="223" text-anchor="middle" dominant-baseline="central">OrderQueryService</text></g>
<line x1="505" y1="220" x2="605" y2="220" class="arr" marker-end="url(#b2)"/>
<g class="c-blue" opacity="0.7"><rect x="610" y="200" width="60" height="40" rx="6"/><text class="tc" x="640" y="223" text-anchor="middle" dominant-baseline="central">orders</text></g>
</svg>
