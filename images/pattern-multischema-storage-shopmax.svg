<svg width="700" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multischema Storage: neue Sendungen selbst gehalten, alte noch im Monolithen</title>
<desc>Shipping-Service legt ab einem Stichtag neue Sendungen in seiner eigenen Datenbank an, fragt aber fuer Sendungen von vor dem Stichtag weiterhin per API beim Monolithen nach.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
</style>
<defs>
  <marker id="a9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="c-purple">
  <rect x="270" y="30" width="170" height="46" rx="6"/>
  <text class="th" x="355" y="53" text-anchor="middle" dominant-baseline="central">Shipping-Service</text>
</g>

<line x1="330" y1="76" x2="150" y2="140" class="arr" marker-end="url(#a9)"/>
<text class="tc" x="150" y="105" fill="#0F6E56">neue Sendung anlegen</text>
<text class="tc" x="150" y="120" fill="#8A8880">(ab Stichtag)</text>

<g class="c-teal">
  <rect x="30" y="145" width="220" height="55" rx="6"/>
  <text class="ts" x="140" y="165" text-anchor="middle">eigene shipments-DB</text>
  <text class="tc" x="140" y="183" text-anchor="middle">(nur neue Sendungen)</text>
</g>

<line x1="380" y1="76" x2="560" y2="140" class="arr" marker-end="url(#a9)"/>
<text class="tc" x="450" y="105">API-Anfrage</text>
<text class="tc" x="450" y="120" fill="#8A8880">(vor Stichtag)</text>

<g class="c-gray">
  <rect x="450" y="145" width="220" height="55" rx="6"/>
  <text class="ts" x="560" y="165" text-anchor="middle">Monolith (via API)</text>
  <text class="tc" x="560" y="183" text-anchor="middle">(historische Sendungen)</text>
</g>

<text class="ts" x="30" y="225">Uebergangszustand — wird mit Pattern 9 aufgeloest, sobald auch die Altdaten migriert sind.</text>
</svg>
