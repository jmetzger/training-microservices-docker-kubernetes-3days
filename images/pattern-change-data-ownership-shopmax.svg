<svg width="700" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Change Data Ownership: Inventory-Service uebernimmt die Schreibhoheit</title>
<desc>Vorher schreibt Order-Service direkt in die inventory-Tabelle, Ownership ist unklar. Nachher darf nur noch Inventory-Service schreiben, Order-Service ruft dessen API auf.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.c-gray .th { fill: #444441; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
</style>
<defs>
  <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="28">1. Vorher — Ownership unklar</text>

<g class="c-blue">
  <rect x="30" y="45" width="150" height="50" rx="8"/>
  <text class="th" x="105" y="72" text-anchor="middle" dominant-baseline="central">Order-Service</text>
</g>
<line x1="180" y1="70" x2="470" y2="70" class="arr" marker-end="url(#a1)" stroke="#B5433B" stroke-dasharray="4 3"/>
<text class="tc" x="220" y="60" fill="#B5433B">UPDATE inventory SET stock_level = ...  (direktes SQL)</text>

<g class="c-teal">
  <rect x="30" y="115" width="150" height="50" rx="8"/>
  <text class="th" x="105" y="142" text-anchor="middle" dominant-baseline="central">Inventory-Service</text>
</g>
<line x1="180" y1="140" x2="470" y2="90" class="arr" stroke-dasharray="4 3"/>
<text class="tc" x="185" y="128" fill="#8A8880">schreibt manchmal auch — kein klarer Owner</text>

<g class="c-gray">
  <rect x="475" y="60" width="195" height="50" rx="8"/>
  <text class="th" x="572" y="80" text-anchor="middle" dominant-baseline="central">inventory (Tabelle)</text>
  <text class="tc" x="572" y="98" text-anchor="middle" fill="#8A8880">zwei moegliche Schreiber</text>
</g>

<line x1="30" y1="200" x2="670" y2="200" stroke="#DEDBD0" stroke-width="1"/>

<text class="th" x="30" y="228">2. Nachher — ein Owner, technisch erzwungen</text>

<g class="c-blue">
  <rect x="30" y="245" width="150" height="45" rx="8"/>
  <text class="th" x="105" y="270" text-anchor="middle" dominant-baseline="central">Order-Service</text>
</g>
<line x1="180" y1="267" x2="290" y2="267" class="arr" marker-end="url(#a1)"/>
<text class="tc" x="185" y="255">POST /inventory/reserve</text>

<g class="c-teal">
  <rect x="295" y="245" width="180" height="45" rx="8"/>
  <text class="th" x="385" y="270" text-anchor="middle" dominant-baseline="central">Inventory-Service</text>
</g>
<line x1="475" y1="267" x2="565" y2="267" class="arr" marker-end="url(#a1)"/>

<g class="c-gray">
  <rect x="570" y="245" width="100" height="45" rx="8"/>
  <text class="ts" x="620" y="264" text-anchor="middle" dominant-baseline="central">inventory</text>
  <text class="tc" x="620" y="280" text-anchor="middle" fill="#0F6E56">nur 1 Schreiber</text>
</g>
</svg>
