<svg width="700" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Tracer Write: Reihenfolge der Tabellenmigration im Bestellprozess</title>
<desc>orders, order_items, shipments und invoices wandern zuerst gemeinsam. payments folgt danach, weil es auf das BestellungAufgegeben-Event angewiesen ist. customers wandert zuletzt.</desc>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.tc { font-size: 11px; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-blue .th { fill: #0C447C; }
.c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.c-teal .th { fill: #085041; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-purple .th { fill: #3C3489; }
</style>
<defs>
  <marker id="a6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="30" y="28">Schritt 1</text>
<g class="c-blue">
  <rect x="30" y="45" width="190" height="90" rx="8"/>
  <text class="ts" x="125" y="65" text-anchor="middle">orders</text>
  <text class="tc" x="125" y="83" text-anchor="middle">+ order_items</text>
  <text class="tc" x="125" y="99" text-anchor="middle">+ shipments</text>
  <text class="tc" x="125" y="115" text-anchor="middle">+ invoices</text>
</g>

<line x1="220" y1="90" x2="290" y2="90" class="arr" marker-end="url(#a6)"/>
<text class="tc" x="222" y="78">BestellungAufgegeben-Event</text>

<text class="th" x="295" y="28">Schritt 2</text>
<g class="c-teal">
  <rect x="295" y="45" width="150" height="90" rx="8"/>
  <text class="ts" x="370" y="90" text-anchor="middle" dominant-baseline="central">payments</text>
</g>

<line x1="445" y1="90" x2="500" y2="90" class="arr" marker-end="url(#a6)"/>

<text class="th" x="505" y="28">Schritt 3</text>
<g class="c-purple">
  <rect x="505" y="45" width="150" height="90" rx="8"/>
  <text class="ts" x="580" y="90" text-anchor="middle" dominant-baseline="central">customers</text>
</g>

<text class="ts" x="30" y="175">Jeder Kasten = eigener Synchronize-Data-in-Application-Durchlauf (Backfill/Dual Write/Cutover)</text>
<text class="ts" x="30" y="195">Schritt 2 kann erst starten, wenn Schritt 1 zuverlaessig Events veroeffentlicht.</text>
<text class="ts" x="30" y="215">Schritt 3 haengt nur von Schritt 1 ab, koennte parallel zu Schritt 2 laufen.</text>
</svg>
